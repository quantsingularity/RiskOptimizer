global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "riskoptimizer-dev"
    environment: "development"

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s

  - job_name: "riskoptimizer-backend"
    static_configs:
      - targets: ["backend:8081"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s
