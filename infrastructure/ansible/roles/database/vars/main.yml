---
# Database configuration - passwords should come from Vault or ansible-vault encrypted vars
db_name: "{{ hostvars[inventory_hostname]['db_name'] | default('riskoptimizerdb') }}"
db_user: "{{ hostvars[inventory_hostname]['db_user'] | default('appuser') }}"
db_password: "{{ hostvars[inventory_hostname]['db_password'] | mandatory }}"
postgresql_version: "15"
postgresql_data_dir: /var/lib/postgresql/15/main
postgresql_conf_dir: /etc/postgresql/15/main
