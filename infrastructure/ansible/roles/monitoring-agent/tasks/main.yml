---
- name: Install CloudWatch agent (AWS)
  yum:
    name: amazon-cloudwatch-agent
    state: present
  when: ansible_os_family == "RedHat" and cloud_provider | default('aws') == 'aws'

- name: Configure CloudWatch agent
  template:
    src: cloudwatch-config.json.j2
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    owner: root
    group: root
    mode: "0640"
  notify: Restart CloudWatch Agent
  when: cloud_provider | default('aws') == 'aws'

- name: Install node_exporter for Prometheus
  block:
    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version | default('1.7.0') }}/node_exporter-{{ node_exporter_version | default('1.7.0') }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
        mode: "0644"

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /usr/local/bin
        remote_src: yes
        extra_opts: ["--strip-components=1", "--wildcards", "*/node_exporter"]

    - name: Set node_exporter permissions
      file:
        path: /usr/local/bin/node_exporter
        owner: root
        group: root
        mode: "0755"

    - name: Create node_exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          Type=simple
          User=nobody
          ExecStart=/usr/local/bin/node_exporter \
            --collector.systemd \
            --collector.processes \
            --web.listen-address=127.0.0.1:9100
          Restart=on-failure
          RestartSec=5s
          NoNewPrivileges=yes
          PrivateTmp=yes
          ProtectHome=yes
          ProtectSystem=strict

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Restart node_exporter

    - name: Start and enable node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes
