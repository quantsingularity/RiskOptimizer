# Docker Compose override for production-like testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

version: "3.9"

services:
  backend:
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  postgres:
    # Do NOT expose postgres in production
    ports: []

  redis:
    # Do NOT expose redis in production
    ports: []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
      --protected-mode yes
