# Docker Compose override for local development
# Automatically merged with docker-compose.yml when running docker compose up

version: "3.9"

services:
  backend:
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      ENABLE_DEBUG_MODE: "true"
    # Mount source for hot reload in development
    volumes:
      - type: bind
        source: ../src
        target: /app/src
        read_only: true
      - type: tmpfs
        target: /tmp
      - type: tmpfs
        target: /app/logs
    command: ["node", "--watch", "dist/server.js"]

  postgres:
    # Expose postgres directly in dev for local tooling
    ports:
      - "5432:5432"

  redis:
    # Expose redis directly in dev for local tooling
    ports:
      - "6379:6379"
