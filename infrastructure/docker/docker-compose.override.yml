# Docker Compose override for local development
# Automatically merged with docker-compose.yml when running docker compose up

version: "3.9"

services:
  backend:
    environment:
      FLASK_ENV: development
      LOG_LEVEL: DEBUG
      ENABLE_DEBUG_MODE: "true"
    # Mount backend source for hot reload in development
    volumes:
      - type: bind
        source: ../../code/backend
        target: /app
        read_only: false
      - type: tmpfs
        target: /tmp
      - type: tmpfs
        target: /app/logs
    command:
      [
        "gunicorn",
        "--bind",
        "0.0.0.0:8080",
        "--reload",
        "--workers",
        "1",
        "app:app",
      ]

  postgres:
    # Expose postgres directly in dev for local tooling
    ports:
      - "5432:5432"

  redis:
    # Expose redis directly in dev for local tooling
    ports:
      - "6379:6379"
