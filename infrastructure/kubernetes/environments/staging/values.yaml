appName: riskoptimizer
environment: staging

# Backend configuration
backend:
  replicas: 3
  image:
    repository: registry.example.com/app/backend
    tag: stable
    pullPolicy: Always
  containerPort: 8080
  servicePort: 80
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  apiUrl: http://riskoptimizer-backend:8080

# Frontend configuration
frontend:
  replicas: 3
  image:
    repository: registry.example.com/app/frontend
    tag: stable
    pullPolicy: Always
  containerPort: 8080
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

# Database configuration
database:
  replicas: 1
  image:
    repository: postgres
    tag: 15-alpine
    pullPolicy: IfNotPresent
  containerPort: 5432
  servicePort: 5432
  name: riskoptimizerdb
  user: appuser
  password: staging-password
  url: "postgresql://appuser:${DB_PASSWORD}@riskoptimizer-database:5432/appdb"
  storageClass: standard
  storage: 20Gi
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

# Redis configuration
redis:
  replicas: 2
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  storageClass: standard
  storage: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi

# Ingress configuration
ingress:
  host: staging.riskoptimizer.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging

# General configuration
logLevel: info
imagePullSecrets: regcred
