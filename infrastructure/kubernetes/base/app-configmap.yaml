---
apiVersion: v1
kind: ConfigMap
metadata:
  name: riskoptimizer-app-config
  namespace: riskoptimizer
  labels:
    app: riskoptimizer
data:
  API_URL: "http://riskoptimizer-backend:8080"
  REDIS_HOST: "riskoptimizer-redis"
  REDIS_PORT: "6379"
  DATABASE_HOST: "riskoptimizer-database"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "riskoptimizerdb"
  DATABASE_USER: "appuser"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  METRICS_PORT: "8081"
  HEALTH_PORT: "8082"
