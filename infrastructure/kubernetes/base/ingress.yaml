---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: riskoptimizer-ingress
  namespace: riskoptimizer
  annotations:
    nginx.ingress.kubernetes.io/ingress-class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()";
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - riskoptimizer.example.com
      secretName: riskoptimizer-tls
  rules:
    - host: riskoptimizer.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: riskoptimizer-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: riskoptimizer-frontend
                port:
                  number: 80
