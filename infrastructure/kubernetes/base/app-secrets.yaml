---
apiVersion: v1
kind: Secret
metadata:
  name: riskoptimizer-secrets
  namespace: riskoptimizer
  annotations:
    # Rotate these secrets via Vault or external-secrets-operator
    # Values here are EXAMPLES ONLY - replace before deploying
type: Opaque
data:
  # All values are base64-encoded placeholders - replace with real secrets
  # Use: echo -n 'value' | base64
  database-url: REPLACE_WITH_BASE64_ENCODED_POSTGRES_URL
  database-password: REPLACE_WITH_BASE64_ENCODED_PASSWORD
  jwt-secret: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET
  redis-password: REPLACE_WITH_BASE64_ENCODED_REDIS_PASSWORD
  api-key: REPLACE_WITH_BASE64_ENCODED_API_KEY
