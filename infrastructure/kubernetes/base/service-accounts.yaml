---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: riskoptimizer-backend
  namespace: riskoptimizer
  labels:
    app: riskoptimizer-backend
  annotations:
    # AWS IRSA - replace with your account ID and OIDC provider
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/riskoptimizer-backend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: riskoptimizer-frontend
  namespace: riskoptimizer
  labels:
    app: riskoptimizer-frontend
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: riskoptimizer-redis
  namespace: riskoptimizer
  labels:
    app: riskoptimizer-redis
automountServiceAccountToken: false
