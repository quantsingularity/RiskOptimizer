---
apiVersion: v1
kind: Service
metadata:
  name: riskoptimizer-redis
  namespace: riskoptimizer
  labels:
    app: riskoptimizer-redis
    component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: riskoptimizer-redis
    component: cache
