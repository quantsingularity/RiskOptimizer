---
apiVersion: v1
kind: Service
metadata:
  name: riskoptimizer-backend
  namespace: riskoptimizer
  labels:
    app: riskoptimizer-backend
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: metrics
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: health
  selector:
    app: riskoptimizer-backend
    component: api
