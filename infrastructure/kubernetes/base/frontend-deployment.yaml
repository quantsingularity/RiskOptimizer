---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: riskoptimizer-frontend
  namespace: riskoptimizer
  labels:
    app: riskoptimizer-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: riskoptimizer-frontend
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: riskoptimizer-frontend
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: riskoptimizer-frontend
          image: registry.example.com/app/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          env:
            - name: REACT_APP_API_URL
              value: /api
            - name: REACT_APP_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp-volume
          emptyDir:
            sizeLimit: 256Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 16Mi
      imagePullSecrets:
        - name: regcred
      terminationGracePeriodSeconds: 30
